<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Call Notification</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
    /* ── Theme variables (mirrors your globals.css exactly) ── */
    :root {
      --background:        hsl(60, 100%, 96.5%);
      --foreground:        hsl(0, 0%, 10%);
      --card:              hsl(60, 47%, 91%);
      --border:            hsl(55, 17%, 83.5%);
      --primary:           hsl(249, 100%, 85%);
      --primary-foreground:hsl(0, 0%, 10%);
      --muted:             hsl(60, 47%, 91%);
      --muted-foreground:  hsl(0, 0%, 53.3%);
      --surface:           hsl(60, 47%, 91%);
      --radius:            0.5rem;
    }
 
    .dark {
      --background:        hsl(240, 1%, 13.3%);
      --foreground:        hsl(40, 14%, 93.7%);
      --card:              hsl(240, 1%, 17.3%);
      --border:            hsl(240, 1%, 20%);
      --primary:           hsl(58, 67%, 47.1%);
      --primary-foreground:hsl(240, 1%, 13.3%);
      --muted:             hsl(240, 1%, 17.3%);
      --muted-foreground:  hsl(0, 0%, 53.3%);
      --surface:           hsl(240, 1%, 17.3%);
    }
 
    /* ── Reset & base ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    * { background: transparent; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
    }
 
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      animation: slideIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
 
    /* ── Entrance animation ── */
    @keyframes slideIn {
      from { transform: translateX(120px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0);     opacity: 1; }
      to   { transform: translateX(120px); opacity: 0; }
    }
    body.dismissing { animation: slideOut 0.28s cubic-bezier(0.4, 0, 1, 1) forwards; }
 
    /* ── Pulsing ring ── */
    @keyframes ring-pulse {
      0%   { transform: scale(1);    opacity: 0.5; }
      70%  { transform: scale(1.7);  opacity: 0;   }
      100% { transform: scale(1.7);  opacity: 0;   }
    }
    @keyframes phone-shake {
      0%, 100% { transform: rotate(-9deg); }
      50%       { transform: rotate( 9deg); }
    }
 
    /* ── Progress bar ── */
    .progress-track {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: transparent;
      border-radius: 14px 14px 0 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 100%;
      background: var(--primary);
      opacity: 0.9;
      transform-origin: left center;
      transition: width 80ms linear;
    }
 
    /* ── Card shell ── */
    .card {
      position: relative;
      margin: 10px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow:
        0 8px 24px rgba(0,0,0,.10),
        0 2px 6px  rgba(0,0,0,.06),
        inset 0 1px 0 rgba(255,255,255,.08);
    }
 
    /* ── Body row ── */
    .body {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 14px 14px 10px;
    }
 
    /* ── Icon ── */
    .icon-wrap {
      position: relative;
      flex-shrink: 0;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
    }
    .ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.22;
      animation: ring-pulse 1.8s ease-out infinite;
    }
    .ring:nth-child(2) { animation-delay: 0.6s; }
    .icon-bg {
      position: relative;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px color-mix(in srgb, var(--primary) 40%, transparent);
    }
    .icon-bg svg {
      animation: phone-shake 1.4s ease-in-out infinite;
      color: var(--primary-foreground);
    }
 
    /* ── Text ── */
    .text { flex: 1; min-width: 0; }
    .label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: var(--primary);
      /* darken slightly in light mode so it's readable on cream */
      filter: saturate(1.2) brightness(0.82);
      margin-bottom: 2px;
    }
    .dark .label { filter: none; }
 
    .title {
      font-size: 13px;
      font-weight: 700;
      color: var(--foreground);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .sub {
      font-size: 11.5px;
      color: var(--muted-foreground);
      margin-top: 2px;
      line-height: 1.4;
    }
 
    /* ── Close ── */
    .close-btn {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--muted-foreground);
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }
    .close-btn:hover {
      background: var(--muted);
      color: var(--foreground);
    }
 
    /* ── Divider ── */
    .divider {
      height: 1px;
      margin: 0 14px;
      background: var(--border);
      opacity: 0.7;
    }
 
    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 7px;
      padding: 10px 14px 12px;
    }
    .btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: opacity 0.15s, transform 0.12s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: var(--primary);
      color: var(--primary-foreground);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--primary) 30%, transparent);
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost {
      background: var(--muted);
      color: var(--muted-foreground);
    }
    .btn-ghost:hover { opacity: 0.75; }
 
    /* ── Timer ── */
    .timer {
      font-size: 10px;
      text-align: center;
      padding-bottom: 4px;
      color: var(--muted-foreground);
      opacity: 0.5;
      font-variant-numeric: tabular-nums;
    }
</style>
</head>
<body>
 
  <div class="progress-track">
<div class="progress-fill" id="progressFill"></div>
</div>
 
  <div class="card">
<div class="body">
<div class="icon-wrap">
<div class="ring"></div>
<div class="ring"></div>
<div class="icon-bg">
<!-- phone icon inline SVG -->
<svg id="phone-icon" width="17" height="17" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07
                     A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.43
                     20 20 0 0 1 3.6 1.27a2 2 0 0 1 2.06.26l3.75 3.74
                     a2 2 0 0 1 .44 2.19L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27
                     a2 2 0 0 1 2.19.44l3.74 3.74a2 2 0 0 1 .26 2.1z"/>
</svg>
</div>
</div>
 
      <div class="text">
<div class="label">Incoming Call</div>
<div class="title" id="callTitle">Call detected</div>
<div class="sub">Start transcribing this call?</div>
</div>
 
      <button class="close-btn" onclick="dismiss()" aria-label="Dismiss">
<svg width="11" height="11" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
<line x1="18" y1="6" x2="6" y2="18"/>
<line x1="6" y1="6" x2="18" y2="18"/>
</svg>
</button>
</div>
 
    <div class="divider"></div>
 
    <div class="actions">
<button class="btn btn-primary" onclick="startTranscription()">
<svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
<path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
<line x1="8" y1="23" x2="16" y2="23"/>
</svg>
        Transcribe
</button>
<button class="btn btn-ghost" onclick="dismiss()">
<svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<line x1="1" y1="1" x2="23" y2="23"/>
<path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
<path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
<line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
</svg>
        Not now
</button>
</div>
 
    <div class="timer" id="timer">Dismisses in 10s</div>
</div>
 
  <script>
    // ── Theme detection ────────────────────────────────────────────────────
    // Reads the OS preference; Tauri will pass the app's actual preference
    // via the window label or a query param e.g. ?theme=dark
    const params = new URLSearchParams(window.location.search);
    const forcedTheme = params.get('theme'); // 'dark' | 'light' | null
    const prefersDark = forcedTheme
      ? forcedTheme === 'dark'
      : window.matchMedia('(prefers-color-scheme: dark)').matches;
 
    if (prefersDark) document.documentElement.classList.add('dark');
 
    // ── App name from query param ──────────────────────────────────────────
    const appName = params.get('app') || 'your call app';
      document.getElementById('callTitle').textContent = `Call on ${appName}`;
  // Add this at the bottom of your <script> block in popup.html,
  // replacing the existing tick/dismiss/startTranscription block

  const DURATION = 10000;
  const fill     = document.getElementById('progressFill');
  const timerEl  = document.getElementById('timer');
  let   start    = null;
  let   raf      = null;

  function resetAndStart(appName) {
    // Reset countdown
    cancelAnimationFrame(raf);
    start = null;
    document.body.classList.remove('dismissing');
    if (appName) {
      document.getElementById('callTitle').textContent = `Call on ${appName}`;
    }
    raf = requestAnimationFrame(tick);
  }

  function tick(now) {
    if (!start) start = now;
    const elapsed  = now - start;
    const fraction = Math.max(0, 1 - elapsed / DURATION);
    fill.style.width = (fraction * 100) + '%';
    timerEl.textContent = `Dismisses in ${Math.ceil(fraction * (DURATION / 1000))}s`;
    if (fraction > 0) {
      raf = requestAnimationFrame(tick);
    } else {
      dismiss(); // auto-dismiss only hides, never opens main window
    }
  }

  async function dismiss() {
    cancelAnimationFrame(raf);
    animateOut();
    setTimeout(async () => {
      try { await window.__TAURI__.core.invoke('dismiss_popup'); }
      catch (e) { console.warn('Tauri invoke failed:', e); }
    }, 280);
  }

  async function startTranscription() {
    cancelAnimationFrame(raf);
    animateOut();
    setTimeout(async () => {
      try { await window.__TAURI__.core.invoke('start_transcription'); }
      catch (e) { console.warn('Tauri invoke failed:', e); }
    }, 280);
  }

  function animateOut() {
    document.body.classList.add('dismissing');
  }

  // Listen for reset event from Tauri (fired each time show_popup is called)
  window.__TAURI__.event.listen('popup-reset', (event) => {
    resetAndStart(event.payload);
  });

  // Start the initial countdown
  raf = requestAnimationFrame(tick);
</script>
</body>
</html>
